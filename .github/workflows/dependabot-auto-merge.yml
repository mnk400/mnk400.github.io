name: Dependabot auto-merge

# Runs on Dependabot's PRs (security fixes + version bumps). It builds the
# site to make sure the update doesn't break anything, then auto-merges
# patch/minor updates. Major bumps are left for manual review.
on: pull_request

# Least-privilege token, but enough to merge the PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only act on Dependabot's own PRs.
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Merge only after the build above succeeds. Patch + minor (which
      # covers the vast majority of security fixes) go in automatically;
      # major bumps fall through to manual review.
      - name: Merge patch & minor updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
