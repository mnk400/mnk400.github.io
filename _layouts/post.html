---
layout: default
---

<div class="post{% if page.date %} post--dated{% endif %}">

	{% if page.title or page.date %}
	<header class="post__header stack stack--sm">
		{% if page.title %}
		<h1 class="post__title">{{ page.title }}</h1>
		{% endif %}

		{% if page.date%}
		<p class="post__date">{{ page.date | date: '%B %-d, %Y' }}.
			{% if page.edit %}
			Edited on {{ page.edit | date: '%B %-d, %Y' }}.
			{% endif %}
		</p>
		{% endif %}
	</header>
	{% endif %}

	<div class="post__content">
		{{ content }}
	</div>

</div>
