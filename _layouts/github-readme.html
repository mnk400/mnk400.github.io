---
layout: default
---

<div class="post github-readme">

    <div class="github-readme__header">
        <h1 class="post__title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="github-readme__description">{{ page.description }}</p>
        {% endif %}
        <a class="github-readme__github-link" href="https://github.com/{{ page.repo }}" target="_blank" rel="noopener noreferrer">
            <i class="ph-fill ph-github-logo"></i> View on GitHub
        </a>
    </div>

    <div class="post__content github-readme__content"
         data-repo="{{ page.repo }}"
         data-branch="{{ page.branch | default: 'main' }}">
        <div class="github-readme__loading">Loading README...</div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="/assets/js/components/readme-renderer.js"></script>
