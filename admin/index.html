<!DOCTYPE html>
<html data-theme="linen">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f2f0ef">
    <title>Manik - Admin</title>

    <link rel="stylesheet" href="https://manik.cc/style/export.css">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/bold/style.css">

    <link rel="stylesheet" href="/admin.css">
</head>
<body>
    <div class="admin-wrapper stack stack--lg">
        <h1>Admin</h1>

        <div class="selection-switch" id="album-switch"></div>

        <div class="cluster cluster--sm">
            <button class="btn" id="new-album-btn">
                <i class="ph-bold ph-plus"></i> New Album
            </button>
            <button class="btn" id="manage-fields-btn">
                <i class="ph-bold ph-sliders"></i> Manage Fields
            </button>
        </div>

        <div class="upload-zone" id="upload-zone">
            <p>Drop images here or click to upload</p>
            <input class="image-upload__input" type="file" id="file-input" multiple accept="image/*">
        </div>

        <div class="action-bar toolbar">
            <div class="status-bar" id="status-bar"></div>
            <button class="btn btn--publish" id="publish-btn" disabled>
                Publish
            </button>
        </div>

        <div class="image-grid" id="image-grid"></div>
    </div>

    <div class="admin-modal" id="fields-modal" hidden>
        <form class="admin-modal__panel" id="fields-form">
            <div class="admin-modal__header flex-between">
                <h2>Manage Fields</h2>
                <button class="btn field-row__remove" id="fields-close-btn" type="button" aria-label="Close">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>

            <div class="stack">
                <p class="admin-modal__hint">
                    Fields define the per-image values stored in item.meta. Options are only used by Select fields.
                </p>

                <div class="cluster cluster--sm" aria-label="Common fields">
                    <button class="btn btn--small" type="button" data-field-template="owned">Owned</button>
                    <button class="btn btn--small" type="button" data-field-template="camera">Camera</button>
                    <button class="btn btn--small" type="button" data-field-template="film">Film</button>
                    <button class="btn btn--small" type="button" data-field-template="location">Location</button>
                    <button class="btn btn--small" type="button" data-field-template="notes">Notes</button>
                </div>

                <div class="stack stack--sm" id="field-manager"></div>

                <button class="btn" type="button" id="add-field-btn">
                    <i class="ph-bold ph-plus"></i> Add Field
                </button>
            </div>

            <div class="admin-modal__footer flex-between">
                <button class="btn" type="button" id="fields-cancel-btn">Cancel</button>
                <button class="btn" type="submit">Save Fields</button>
            </div>
        </form>
    </div>

    <div class="item-editor" id="item-editor" hidden>
        <div class="item-editor__backdrop" data-close-editor></div>
        <form class="item-editor__panel" id="item-editor-form">
            <div class="item-editor__header flex-between">
                <h2>Edit Image</h2>
                <button class="btn field-row__remove" type="button" data-close-editor aria-label="Close editor">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>

            <img class="item-editor__preview" id="editor-preview" alt="">

            <div class="stack">
                <div class="field">
                    <label class="field__label" for="editor-title">Title</label>
                    <input id="editor-title" type="text" autocomplete="off">
                </div>

                <div class="field">
                    <label class="field__label" for="editor-description">Description</label>
                    <textarea id="editor-description"></textarea>
                </div>

                <div class="stack" id="editor-meta"></div>
            </div>

            <div class="item-editor__footer flex-between">
                <button class="btn" type="button" id="editor-delete-btn">
                    <i class="ph-bold ph-trash"></i> Delete
                </button>
                <button class="btn" type="button" data-close-editor>Done</button>
            </div>
        </form>
    </div>

    <script src="https://manik.cc/assets/js/core/theme-config.js"></script>
    <script src="https://manik.cc/assets/js/core/theme-manager.js"></script>
    <script src="https://manik.cc/assets/js/core/ui-components.js"></script>

    <script src="/admin.js"></script>
</body>
</html>
